<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planning Repas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/planning.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>

<div class="app">

  <!-- ═══════════════════ BARRE DU HAUT ═══════════════════ -->
  <header class="topbar">
    <h1 class="topbar__title">🍽 Planning Repas</h1>
  </header>

  <!-- ═══════════════════ CORPS ═══════════════════ -->
  <div class="app__body">

    <!-- Zone principale : grille des plannings -->
    <main class="planning-area">
      <div class="planning-area__inner">

        <!-- Légende des tags -->
        <div class="tag-legend">
          <div class="tag-legend__item"><span class="tag tag--midi">☀ Midi</span> Midi seul.</div>
          <div class="tag-legend__item"><span class="tag tag--soir">🌙 Soir</span> Soir seul.</div>
          <div class="tag-legend__item"><span class="tag tag--double">×2</span> 2 portions</div>
          <div class="tag-legend__item">
            <span class="tag tag--portion-1">P1</span>
            <span class="tag tag--portion-2" style="margin-left:3px">P2</span>
            Portions liées
          </div>
        </div>

        <!-- Les blocs de planning sont injectés ici -->
        <div id="js-plannings-container"></div>

      </div>
    </main>

    <!-- Panneau latéral : liste des plats -->
    <aside class="sidebar">
      <div class="sidebar__inner">

        <!-- Section plats -->
        <div class="sidebar__section">
          <div class="sidebar__section-header">
            <h3 class="sidebar__section-title">Plats</h3>
            <div class="sidebar__section-actions">
              <!-- Bouton d'accès à la gestion des ingrédients -->
              <button class="btn btn--ghost-amber btn--xs" onclick="Modals.openIngredientManager()">
                🧂 Ingrédients
              </button>
              <!-- Bouton d'ajout d'un plat -->
              <button class="btn btn--primary btn--xs" onclick="Modals.openDishForm()">
                ＋ Ajouter
              </button>
            </div>
          </div>
          <!-- Liste des plats (injectée par sidebar.js) -->
          <div class="dish-list" id="js-dish-list"></div>
        </div>

      </div>
    </aside>

  </div><!-- fin app__body -->
</div><!-- fin app -->


<!-- ═══════════════════ MODALES (fixed, par-dessus tout) ═══════════════════ -->

<!-- Sélection d'un plat pour un créneau -->
<div class="modal-overlay" id="modal-slot-picker">
  <div class="modal modal--narrow">
    <div class="modal__header">
      <h2 class="modal__title">Choisir un plat</h2>
      <button class="modal__close-btn" onclick="Modals.close('modal-slot-picker')">✕</button>
    </div>
    <div class="slot-picker__options" id="js-slot-options"></div>
  </div>
</div>

<!-- Formulaire d'un ingrédient (création / édition) -->
<div class="modal-overlay" id="modal-ingredient-form">
  <div class="modal modal--narrow">
    <div class="modal__header">
      <h2 class="modal__title" id="js-ingredient-form-title">Nouvel ingrédient</h2>
      <button class="modal__close-btn" onclick="Modals.close('modal-ingredient-form')">✕</button>
    </div>
    <div class="form-field">
      <label class="form-field__label">Nom</label>
      <input class="form-field__input" type="text" id="js-ingredient-name" placeholder="ex: Carottes">
    </div>
    <div class="form-field">
      <label class="form-field__label">Unité de mesure</label>
      <input class="form-field__input" type="text" id="js-ingredient-unit" placeholder="ex: g, cl, unité(s)">
    </div>
    <div class="modal__footer">
      <button class="btn" onclick="Modals.close('modal-ingredient-form')">Annuler</button>
      <button class="btn btn--primary" onclick="Modals.saveIngredient()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Gestionnaire d'ingrédients (liste complète + CRUD) -->
<div class="modal-overlay" id="modal-ingredient-manager">
  <div class="modal modal--medium">
    <div class="modal__header">
      <h2 class="modal__title">Gestion des ingrédients</h2>
      <button class="modal__close-btn" onclick="Modals.close('modal-ingredient-manager')">✕</button>
    </div>
    <div class="ingredient-manager__toolbar">
      <button class="btn btn--ghost-amber btn--sm" onclick="Modals.openIngredientForm()">＋ Nouvel ingrédient</button>
    </div>
    <!-- Liste des ingrédients (injectée par sidebar.js) -->
    <div class="ingredient-manager__list" id="js-ingredient-list"></div>
    <div class="modal__footer">
      <button class="btn" onclick="Modals.close('modal-ingredient-manager')">Fermer</button>
    </div>
  </div>
</div>

<!-- Formulaire d'un plat (création / édition) -->
<div class="modal-overlay" id="modal-dish-form">
  <div class="modal modal--wide">
    <div class="modal__header">
      <h2 class="modal__title" id="js-dish-form-title">Ajouter un plat</h2>
      <button class="modal__close-btn" onclick="Modals.close('modal-dish-form')">✕</button>
    </div>

    <!-- Champs principaux du plat -->
    <div class="form-field">
      <label class="form-field__label">Nom du plat</label>
      <input class="form-field__input" type="text" id="js-dish-name" placeholder="ex: Gratin dauphinois">
    </div>
    <div class="dish-form__options-row">
      <div class="form-field">
        <label class="form-field__label">Créneau autorisé</label>
        <select class="form-field__input" id="js-dish-restriction">
          <option value="both">Midi et soir</option>
          <option value="midi">☀ Midi seulement</option>
          <option value="soir">🌙 Soir seulement</option>
        </select>
      </div>
      <label class="checkbox-row" style="padding-bottom:8px">
        <input type="checkbox" id="js-dish-double">
        <span>2 portions</span>
      </label>
    </div>

    <div class="modal__separator"></div>

    <!-- Ingrédients déjà ajoutés au plat -->
    <div class="form-field">
      <label class="form-field__label">Ingrédients du plat</label>
      <div class="dish-ingredient-editor" id="js-dish-ingredient-selected"></div>
    </div>

    <div class="modal__separator"></div>

    <!-- Picker pour ajouter un ingrédient -->
    <div class="form-field">
      <label class="form-field__label">Ajouter un ingrédient</label>
      <div class="ingredient-picker">
        <input class="form-field__input" type="text" id="js-ingredient-picker-search"
          placeholder="Rechercher ou créer…" oninput="Modals.onIngredientPickerSearch(this.value)">
        <div class="ingredient-picker__list" id="js-ingredient-picker-list"></div>
      </div>
    </div>

    <div class="modal__footer">
      <button class="btn" onclick="Modals.close('modal-dish-form')">Annuler</button>
      <button class="btn btn--primary" onclick="Modals.saveDish()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Liste de courses -->
<div class="modal-overlay" id="modal-shopping-list">
  <div class="modal modal--wide">
    <div class="modal__header">
      <h2 class="modal__title" id="js-shopping-list-title">🛒 Liste de courses</h2>
      <button class="modal__close-btn" onclick="Modals.close('modal-shopping-list')">✕</button>
    </div>
    <div class="shopping-list__content" id="js-shopping-list-content"></div>
    <div class="modal__footer">
      <button class="btn" onclick="Modals.close('modal-shopping-list')">Fermer</button>
    </div>
  </div>
</div>

<!-- Confirmation générique (remplace window.confirm, bloqué en iframe sandbox) -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal modal--narrow">
    <div class="modal__header">
      <h2 class="modal__title">Confirmation</h2>
    </div>
    <p class="confirm-modal__message" id="js-confirm-message"></p>
    <div class="modal__footer">
      <button class="btn" onclick="Modals.close('modal-confirm')">Annuler</button>
      <button class="btn btn--danger" id="js-confirm-ok-btn">Confirmer</button>
    </div>
  </div>
</div>

<!-- Indicateur de chargement / sauvegarde -->
<div class="save-indicator" id="js-save-indicator">💾 Sauvegarde…</div>


<!-- ═══════════════════ SCRIPTS (ordre important) ═══════════════════ -->
<script src="js/storage.js"></script>
<script src="js/state.js"></script>
<script src="js/planning.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/modals.js"></script>
<script>
  /**
   * Point d'entrée principal.
   * Ferme les modales en cliquant sur l'overlay,
   * puis initialise l'affichage une fois les données chargées.
   */
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('modal-overlay--open');
    });
  });

  // Chargement des données puis rendu initial
  Storage.load().then(() => {
    Planning.renderAll();
    Sidebar.renderDishList();
  });
</script>

</body>
</html>
